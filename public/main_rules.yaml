sections:
  - id: introduction
    title: Introduction
    summary: >-
      A lightweight TTRPG that focuses on swift gameplay, tactical combat, and simple yet rewarding progression.
    body: 
      - Arcus is a pen and paper tabletop role playing game (TTRPG). This system is designed for a fantasy adventure setting and draws inspiration from a wide variety of TTRPG, video game, and board game systems to deliver an expressly simple, yet versatile and powerful ruleset. Arcus' unique take on combat and abilities grants players an abundance of choices in fights and in character progression, encourages teamwork, and provides greater tactical depth. 
      - If you like games such as Divinity Original Sin 2, Baldur's Gate 3, or Gloom/Frosthaven, and wish there was a way to enjoy their fun combat systems within a simple, immersive, and flexible tabletop RPG format - this might be the game for you. If you enjoy Dungeons and Dragons 5e, Pathfinder 2e, or Draw Steel and want something a little more from combat without too much additional complexity or heroic elements - this might be the game for you.

  - id: resolution-mechanics
    title: Resolution Mechanics
    summary: How to resolve challenges and conflicts by rolling dice.
    children:
      - id: dice-system
        title: Core Dice System
        body: >-
          Arcus uses a d6 dice pool system. Roll a number of d6, commonly determined by attributes or energy, every 5 or 6 rolled counts as 1 success. The three types of dice rolls in Arcus are Challenge, Attack, and Resistance.
        children:
          - id: challenge-roll
            title: Challenge Roll
            summary: "A roll to resolve a challenging task. 3d6 plus d6 equal to an attribute."
            body: 
              - Whenever a player or creature attempts to do something that is challenging (not trivial or impossible), the GM will ask them to roll a challenge roll. The number of dice rolled will always be 3d6 plus additional d6 equal to an attribute. Every 5 or 6 counts as 1 success. The GM will secretly decide a number of successes required (SR) to succeed, rolling a number successes equal to or greater than the SR succeeds.
              - The attribute required for the roll is decided by the GM. Additional dice may be added to the roll based on skills, advantages etc. Similarly, dice may be removed from the roll.
          - id: attack-roll
            title: Attack Roll
            summary: "A roll to resolve an attack and deal damage per success. Select energy type to target. d6 equal to attack power."
            body: 
              - "To resolve an attack against a target, the attacker must first select an energy type to attack: FORT, REFL, or WILL. This determines which energy the target will lose when the attack deals damage."
              - Attack power determines how many d6 the attacker will roll. The attack power will depend on the weapon or attack used, which will most commonly be Light, Medium, or Heavy (3, 6, or 9 d6) plus additional d6 equal to an attribute. Every success (5 or 6 rolled) counts as 1 damage dealt to the target of the attack.
              - The weapon or attack type will determine what attribute is used for the roll. Additional dice may be added to the roll based on skills, advantages etc. Similarly, dice may be removed from the roll.
              - By default attacks may select any of the three energy types. Some attacks are restricted in which energy they can attack. Players being targeted by attacks may select which energy they lose when damage is dealt - only one energy type may be selected.  
          - id: resistance-roll
            title: Resistance Roll
            summary: "A roll to resist an incoming negative effect. d6 equal to energy remaining in one type."
            body:
              - Whenever a player or creature is inflicted with a negative effect they may roll d6 equal to the number of energy points they have remaining in one of the energy types required. Only 1 success is needed to successfully resist the incoming effect.
              - The energy type required is determined by the source of the effect, usually an ability description. If there are multiple energy types, the player will always get to select which energy type they use to resist. If a player inflicts a creature with a negative condition, the player gets to select which energy type the creature must use to attempt to resist.
      
      - id: advantage-disadvantage
        title: Advantage and Disadvantage (Adv/DisAdv)
        summary: A roll with advantage rolls up to 3 additional d6 (+), (++), or (+++). With disadvantage roll up to 3 fewer d6 (-), (--), or (---).
        body: >-
          Advantage and Disadvantage (Adv/DisAdv) can be applied to the roll to add or remove up to three (3) d6 from the number of dice rolled. Adv/DisAdv can negate each other, for example, if 2 Adv and 1 DisAdv are applied to the roll due to various circumstances for the roll, this will result in just 1 Adv, leading to 1 additional d6.
      
      - id: push-for-success
        title: Push for Success
        summary: Automatically succeed a roll which failed by 1 or 2 successes. Take a minor or major setback as a result.
        body: 
          - If a roll has failed and requires 2 or fewer additional successes to be won, a character may 'push for success'. When a character pushes for success they succeed the roll instead of failing. The GM will decide on a minor setback if the roll required 1 additional success, or a major setback if the roll required 2 additional successes. 
          - In rare cases the GM might allow a player to push for success when they fail by 3 successes, leading to a critical setback - this will often involve character death. A push for success can only be successful if the GM or a player at the table can suggest a reasonable setback.
        children:
          - id: minor-setback-examples
            title: Minor Setback Examples
            body:
              - "- Unlocking the door with a lockpick, but making a lot more noise than you'd like when doing so."
              - "- Pulling a muscle as you make a physical check, reducing your movement speed slightly until the next long rest."
              - "- Taking a 1 or 2 direct damage from pushing too hard when achieving something."
              - "- Damaging your armour or weapon slightly, reducing its protection or attack power capabilities by 1."
              - "- Managing to persuade or deceive someone, but making someone else nearby suspicious leading them to question your actions."
              - "- Managing to persuade someone, but you end up having to pay them some gold."
          
          - id: major-setback-examples
            title: Major Setback Examples
            body:
              - "- Taking 5 direct damage from dangerous circumstances while making the check."
              - "- Directly alerting the guards of your location."
              - "- Having your movement speed halved until the next long rest."
              - "- Persuading or deceiving someone, but they learn a secret of your own, which they will likely want to pursue."
              - "- Casting a powerful spell to solve the problem, but the power disturbs some ancient or otherworldly power that wants to make some demands of the player."
              - "- Having to go against your deity's will to achieve your goal, you'll need to redeem yourself."

  - id: creating-a-character
    title: Creating A Character
    children:
      - id: attributes
        title: Attributes
        summary: "Characters have 6 attributes: Strength (STR), Constitution (CON), Dexterity (DEX), Perception (PER), Intelligence (INT), and Spirit (SPI)."
        body:
          - "Characters have 6 attributes: Strength (STR), Constitution (CON), Dexterity (DEX), Perception (PER), Intelligence (INT), and Spirit (SPI)."
                    
          - At level 1, characters have 0 in each attribute and 18 points to assign in any combination of attributes they choose. To increase an attribute from 5 to 6 (and above) it costs 2 points to increase the attribute by 1. Characters may reduce an attribute to -1. However, after assigning attributes and calculating energy, characters must have a minimum value of 1 in each energy type. On every even level (2, 4, 6 etc.) characters gain 2 additional points to assign in any attribute(s) they choose.

        children: 
          - id: strength 
            title: Strength (STR)
            body: A character's physical strength and brute force. In addition to strength based rolls, the strength attribute (STR) can be used for all melee weapons, and to reduce incoming damage with a shield.
          
          - id: constitution 
            title: Constitution (CON)
            body: A combination of the character's overall health and endurance. In addition to constitution based rolls, characters will also have hit points (HP) equal to 5 plus 2 times their constitution attribute (CON).

          - id: dexterity 
            title: Dexterity (DEX)
            body: A character's hand-eye coordination, balance, and overall grace. In addition to dexterity based rolls, the dexterity attribute (DEX) can be used for light and medium melee weapons, and thrown weapon attacks.

          - id: perception 
            title: Perception (PER)
            body: A character's senses/awareness, ability to aim, and their instinctive ability to pick up on details. In addition to perception based rolls, the perception attribute (PER) is used for ranged weapons and sometimes initiative - how early a creature acts in combat.

          - id: intelligence 
            title: Intelligence (INT)
            body: a character's logic and reasoning capabilities as well as memory and knowledge. In addition to intelligence based rolls, the intelligence attribute (INT) is used for some abilities from classes such as Arcane and Psionic.

          - id: spirit 
            title: Spirit (SPI)
            body: A character's mental resolve, confidence and creativity. In addition to spirit based rolls, the spirit attribute (SPI) is used for some abilities from some classes such as Mortality and Elemental.
      
      - id: energy
        title: Energy
        summary: FORT, REFL, and WILL. Acts as a pool of HP, a resource to spend to use abilities, and determines the ability to resist incoming negative effects.
        body:
          - Energy is a resource that can be spent by characters to use more powerful abilities, can be lost when characters suffer damage that targets those energy types, and determines the creature's ability to resist incoming negative effects. 

          - "Characters will have 3 types of Energy: Fortitude, Reflex, and Will. (FORT, REFL, and WILL)."

          - FORT is a sum of STR and CON values. REFL is a sum of DEX and PER values. WILL is a sum of INT and SPI values.
        children: 
          - id: spending-energy
            title: Spending Energy for Abilities
            body:
              - Energy can be spent to use some more powerful abilities. When an ability is used, the creature must choose one of the energy types in the cost and spend all of the cost from that chosen type - the cost cannot be split between multiple types, even if there are multiple separate costs.

          - id: hp-energy
            title: Energy As Hit Points
            body:
              - Armour energy and shield energy are two other pools of energy - armour energy is permanent and shield energy lasts until the start of a creature's next turn. Both armour and shield energy can only act as a pool of HP and be used to resist incoming effects - they cannot be spent on using abilities. Armour energy can be regained when aan effect would cause a creature to regain energy.

              - When a creature suffers damage, energy is always lost first if possible (removing from shield energy first, then armour energy, then energy), then any remaining damage reduces the creature's HP - unless the damage type is direct damage, then it ignores energy and damages HP directly. See the Damage section for more information on how damage is dealt.
          
          - id: resist-energy
            title: Energy For Resisting Conditions
            summary: "Make a resist roll: roll a number of d6 equal to the remaining energy in that type. 1 success to resist and negate the incoming negative effect."
            body:
              - Whenever a player or creature is inflicted with a negative effect they may roll d6 equal to the number of energy points they have remaining in one of the energy types required. Only 1 success is needed to successfully resist the incoming effect.
              - The energy type required is determined by the source of the effect, usually an ability description. If there are multiple energy types, the player will always get to select which energy type they use to resist. If a player inflicts a creature with a negative condition, the player gets to select which energy type the creature must use to attempt to resist.
          
      - id: hit-points
        title: Hit Points
        summary: The amount of damage a creature can suffer before it dies. 
        body:
          - At level 1 characters will have hit points (HP) equal to 5 plus 2 times their CON attribute. 2 CON would lead to 5 + 2*2 = 9 HP. HP can be fully regained on a long rest.

          - See the Unconscious and Death section to learn about what happens when HP is reduced to 0.
      
      - id: skills
        title: Skills
        summary: Apply up to 3 Adv on a roll where a particular skill is applicable to the roll.
        body: 
          - Skills are specific things that a character is specially trained in - think of jobs or tasks a character might have done so often in their life that they've become proficient. These skills apply up to 3 Adv on a roll where that skill is relevant and applicable (decided by the GM).
          - "There are three degrees of skill:  Proficient (+), Expert (++), and Master (+++)." 
          - At level 1 characters have 4 skill points that can either be spent to become Proficient (no higher degree) in skills, or to gain traits (see below) in any combination. Such as 3 Proficient skills and 1 trait, or even 4 traits and no skills. Skills should be discussed with the GM, as they should not be too generic or specific. Don't spend too much time worrying about this, they can always be adjusted later in play."
          - "On every odd level, a character gains 1 additional skill point to spend to either: increase the degree of skill in an existing skill, gain a new skill, or gain a new trait."
        children:
          - id: skill-ideas
            title: Skill ideas
            body:
              - "Below is a list of potential skill ideas, but do aim to be more creative where possible:"
              - Animal Handling, Athletics, Acrobatics, Stealth, Sleight of Hand, Mechanics, Survival, Insight, Investigation, Arcana, Culture, Streetwise, Intimidation, Deception, Persuasion, Performance, Climbing, Rituals, Anatomy, Foraging, Commanding, Hunting, Etiquette, Impersonation, Astrology, Astronomy, Fortune Telling, Music, Religion, Dancing, Tactics, Sailing, Repairs, Bargaining, Politics, Interrogation, Trivia on a Topic, Calligraphy, Clothing, Acting, Cooking, Navigation, Cartography, Surgery, Fishing, Metal, Wood, Stone, Oceans, Mountains, Forests, Jungles, Rivers, Sewers.
      - id: traits
        title: Traits
        summary: Traits are special abilities that provide utility and flavour to a character's background and talents.
        body: 
          - Traits are special abilities that provide utility and flavour to a character's background and talents. As stated in the Skills section, at level 1 a character has 4 skill points to spend either on becoming Proficient in skills, or gaining traits.
          - "On every odd level (3, 5, 7 etc.), a character gains 1 additional skill point to spend to either: increase the degree of skill in an existing skill, gain a new skill, or gain a new trait."
  - id: equipment
    title: Equipment
    summary: Weapons, armour, shields, and other gear that characters can use.
    children:
      - id: weapons
        title: Weapons
        body: >-
          Any weapon is one of the three weapon powers: Light, Medium, or Heavy. It is also one of the three usability types: Melee, Ranged, Versatile. Finally, it is either One-handed or Two-handed. For example, a weapon can be Medium, Melee, and One-handed.
      
      - id: armour
        title: Armour
        body:
          - Armour grants additional energy to a creature in a separate Armour pool, which can only be used as a form of HP and cannot be spent for casting abilities etc. Armour will reduce movement speed as a cost. 
          - "Light armour increases the armour energy by 5 and reduces 1AP movement speed by 10ft; Medium armour increases the armour energy by 8 and reduced speed by 15ft; Heavy armour increases the armour energy by 11 and reduces speed by 20ft. Both of these will be available for FORT, REFL, or WILL in various combinations."
          - "Example Armours:"
      
      - id: shields
        title: Shields
        body: 
          - Equipping a shield unlocks the Raise Shield core action that allows the wielder to gain 1 shield energy in each energy type for 0 AP, or gain 2 shield in each energy type for 1 AP. 

          - Shields require at least 4 STR to equip.

  - id: combat
    title: Combat
    summary: Turn order, action points, energy mechanics, and combat resolution.
    children:
      - id: combat-basics
        title: Combat Basics
        body: 
          - Combat starts when a creature resolves a hostile action against a creature which leads to the other side wanting to take hostile actions against the initiator.

          - Combat takes place on a hex or square grid. Each space on the grid is referred to as a tile and is 5ft across. Whenever a creature moves 5ft it moves 1 tile in any direction, including diagonals.

          - Combat is turn based, each player and creature gets one turn in each round of combat. When a round is complete, the next round begins until the combat goal is achieved, or all hostile creatures on one side are defeated, surrender, or flee.

          - Each creature has 3 action points each turn to spend taking actions such as moving, attacking, and using abilities.

      - id: initiative
        title: Initiative
        body:
          - Initiative determines the order in which turns are taken in combat. 
          
          - Initiator of the combat acts first and then proceeds clockwise around the table. If there is no clear initiator then players and creatures may each make a PER roll to decide who acts first. 
          
          - The GM may place 1 group of enemies between each player, if there are too many enemy groups, the remaining groups are placed after the last player to act. The initiative remains static for the rest of the fight.
          
          - "Alternative Initiative Ruling: Alternating initiative between PCs and GM where 1 creature or player from each side takes a turn and then it is passed back to the other side. The GM decides who is going first based on who initiated the combat, if there is no clear initiator then PCs roll for PER and if one of them gets the SR determined by the GM for this combat, the PCs may go first. If it is the PCs turn they may decide amongst them who will take that turn, after that player's turn is complete they cannot take another turn this round. Then it is the GMs turn and they will choose which creature will take their turn, and after that it is passed back to the PCs to choose who will go next, and so on."
      
      - id: action-points
        title: Action Points
        body: 
          - Every turn a character has 3 action points (AP) to spend on movement, attacks, abilities, and so on.

          - See the Core Abilities section for a list of all the abilities that the players always have access to.
        
      - id: reactions
        title: Reactions
        body: 
          - Some specific abilities will only be available as a reaction, which is an ability that has a specific trigger and may be used outside of your turn as well as during. Each creature has one reaction to use on each round of combat. A creature regains its reaction at the start of each of its turns.

          - Attacks of opportunity are the most common type of reaction ability, which allows a creature to make a melee attack against a creature that moves out of melee range using the Move or Shift core abilities.

      - id: energy-combat
        title: Energy in Combat
        body: 
          - At the start of each character's turn they may regain one energy in a type of their choice, up to their maximum.
          
          - "All attacks will target one of the three energy types: FORT, REFL, or WILL. For example: think of this as using a sword to attack the torso (FORT), the limbs (REFL), or the head (WILL). The attacking characters are encouraged to describe how they formulate their attack to target the chosen energy type, to add to the thematics of combat."
          
          - Equally players can describe how they avoid suffering damage to their HP pool by losing their energy instead, such as suffering damage to REFL energy to dodge an attack, or suffering damage to WILL energy to outsmart their opponent by using some spell or item in the environment to throw the attacker off balance.
      
      - id: movement
        title: Movement
        body:
          - Your base movement speed is 50ft. However, this can be affected by armour, abilities, and equipment. You can spend 1 AP to move up to your base movement speed. This movement can be broken up around the other things you do on your turn - for example with 50ft of movement you could move 15ft, then attack, then move the remaining 35ft.
        children:
          - id: difficult-terrain
            title: Difficult Terrain
            body: 
              - It costs 10ft of movement instead of 5ft to move into a tile that is considered difficult terrain. Creatures can also move through allies as if they were difficult terrain. Creatures cannot move through other hostile creatures.
          - id: types-of-movement
            title: Types of Movement
            body:
              - There are several movement types that describe how creatures move in different situations.
            children:
              - id: regular-movement
                title: Regular Movement
                body:
                  - Regular movement includes running, walking, and crawling. Generally referred to as "move" or "movement".
              - id: jumping-movement
                title: Jumping Movement
                body:
                  - Jumping movement works the same as regular movement except obstacles (such as gaps, low obstacles, or small creatures) can be avoided on the path.
                  - The distance that can be jumped in ft is equal to the creature's STR value (if in tile based combat, rounded down to a multiple of 5). The height that can be jumped in ft is equal to half the creature's STR value (if in tile based combat, rounded down to a multiple of 5). What can or cannot be jumped may be up to the GM's discretion. The jump may require a roll depending on the difficulty, distance, or height of the jump - this will use Strength and/or Dexterity depending on the nature of the jump (Strength for greater distance, Dexterity for greater accuracy).
                  - Generally referred to as "jump" or "jumping".
              - id: climbing-movement
                title: Climbing Movement
                body:
                  - Climbing movement works the same as regular movement but is done up a more vertical surface such as up a wall or a tree.
                  - What can or cannot be climbed is up to the GM's discretion. The GM will make the creature perform a skill check based on the difficulty of the surface they are attempting to climb. If successful the creature can climb as if the surface was difficult terrain. The creature must repeat the skill check every time it wishes to move its base movement speed. It is up to the GM if and when they may need to repeat the skill check based on time spent climbing or if the difficulty of the climb significantly changes.
              - id: swimming-movement
                title: Swimming Movement
                body:
                  - Swimming movement works the same as regular movement but is done through a liquid such as water or slime.
                  - What can or cannot be swam through is up to the GM's discretion. The GM will make the creature perform a skill check based on the difficulty. If successful the creature can swim as if the liquid was difficult terrain. It is up to the GM if and when they may need to repeat the skill check based on time spent swimming or if the difficulty of the swim significantly changes.
              - id: teleportation-movement
                title: Teleportation Movement
                body:
                  - Teleportation movement allows a creature to move to a tile they can see, ignoring all obstacles between their start and end tile. Teleportation movement ignores all movement restrictions the creature might have (immobilised or hobbled specifically). Teleportation movement happens instantaneously and cannot be broken up throughout a turn. A creature can teleport to a tile in mid-air.
                  - Generally referred to as "teleport", "teleportation" or "teleported".
              - id: flying-movement
                title: Flying Movement
                body:
                  - Flying movement allows movement in all directions including directly and diagonally up and down.
                  - A creature can only fly if they have a flying movement speed. Some abilities or transformations can unlock a flying movement speed. A flying creature does not have to end its movement on the ground - it does not fall or suffer falling damage while flying. If the creature is knocked prone or stunned they are no longer flying and will immediately fall at normal speed and suffer fall damage as normal. The creature becomes flying again when it spends flying movement speed.
                  - Generally referred to as "fly", "flight" or "flying".
              - id: voluntary-movement
                title: Voluntary Movement
                body:
                  - Movement is considered voluntary if the creature has a choice of how it moves and where. Most movement is considered voluntary.
                  - For example, base movement, or movement gained from a creature's own abilities or ally's abilities.
              - id: involuntary-movement
                title: Involuntary Movement
                body:
                  - Movement is considered involuntary if the creature does not have a choice of how it moves and where.
                  - For example, a hostile pulling, pushing, or teleporting another creature, or any movement effect on a creature that it can attempt to resist.
                  - Movement due to being taunted, frightened, or dominated is still considered voluntary movement.
              - id: push-pull-movement
                title: Push/Pull Movement
                body:
                  - Push/pull movement is always involuntary and ignores difficult terrain and movement restrictions the creature might have (immobilised, paralysed, or hobbled specifically) unless the GM deems it unreasonable.
                  - Generally referred to as "push", "pushed", "pull", or "pulled".
              - id: collisions
                title: Collisions
                body:
                  - A collision is when push movement is stopped or blocked by an object or creature. When a collision occurs, the creature being pushed suffers Light damage and the movement ends.
                  - If multiple creatures are all being pushed by the same ability, these movements happen simultaneously and movement may be stopped. All creatures involved in the push in this way do not suffer damage from colliding with each other. They can still be pushed into other creatures or objects and suffer damage from those collisions.
      - id: attacks
        title: Attacks
        body: >-
          When attacking, a character will select one of the energy types to target and roll a number of d6 equal to the attack power (3, 6, or 9 for Light, Medium, or Heavy respectively) plus a number of d6 equal to one other attribute required for the attack. Each success (hit) will deal 1 damage to the target energy type. If the damage is greater than the number of energy points then the damage will carry over into the target's HP.
        children:
          - id: types-of-attack-roll
            title: Types of Attack Roll
            body:
              - "Weapon, melee, or ranged."
              - "- Weapon attack uses your equipped weapon to make the attack roll."
              - "- Melee weapon attack uses your equipped melee weapon to make the attack roll."
              - "- Ranged weapon attack uses your equipped ranged weapon to make the attack roll - will have DisAdv (-) if you are within melee range of a hostile creature. If this type of attack is made against a target that is at least 10ft above the attacker, the attack is made with DisAdv (-). An attack made against a target 10ft below the attacker is made with Adv (+)."
              - "- Melee attack uses melee range to make the attack roll but does not require a melee weapon. This could include a magical punch attack, which does not require a free hand."
              - "- Ranged attack uses the described range to make the attack roll but does not require a ranged weapon - will have DisAdv (-) if you are within melee range of a hostile creature. If this type of attack is made against a target that is at least 10ft above the attacker, the attack is made with DisAdv (-). An attack made against a target 10ft below the attacker is made with Adv (+). This could include a magical ranged attack, which does not require a free hand."
              - "- Versatile attack uses the described range to make the attack roll - has no disadvantages due to hostile creatures within melee range. This could include a magical ability, which does not require a free hand."
              - "STR, DEX, PER, INT, or SPI: Describes the attribute modifier used to make the attack roll. Can also be described as ATR if there are multiple attribute modifiers that could be used."
              - "Targeting FORT, REFL, or WILL: Describes the energy type that will be targeted by the attack. The target of the attack will lose energy in that type if the attack is successful. If no energy type is listed, the attacker may choose any of the 3 energy types to target."
              - "Attack power: Describes the number of d6 rolled for the attack. Can be Light, Medium, or Heavy."
              - "Damage type: Describes the type of damage dealt by the attack. Can be Physical, Acid, Poison, Fire, Frost, Lightning, Psychic, Force, or Soul. If no damage type is listed, the attack will deal Physical damage. Damage can also be Direct, which ignores energy and damages HP directly."
              - "Regular attack: An attack is considered a regular attack if it is a weapon attack or attack using a class core ability. Attacks that occur during an ability's effect are not considered regular attacks unless stated otherwise."
              - "Attack examples:"
              - "- \"Make a ranged ATR attack against a creature within 50ft with Medium frost attack power targeting FORT or WILL.\""
              - "- \"Make a melee weapon attack against all creatures within weapon range.\""
              - "- \"Make a versatile ATR attack against a creature within 50ft with Medium+ATR attack power targeting FORT.\""
          - id: surprise
            title: Surprise
            body:
              - "If you are hidden from a creature and make an attack against it, you may double the attack power of your attack against the creature."
              - "An attack can be considered as a surprise when a creature that is not expecting a violent threat of any kind, such as not being involved in combat of any kind and unaware of your presence. After this, the attacked creature and other creatures in the area will become aware of your presence - such as the target shouting to their allies to warn them about you - and you will no longer be hidden."
              - "Also if the target is aware of you but is strongly not expecting you to attack them, this may also class as a surprise in some circumstances, gaining the benefit described above. For example, betraying an ally stood beside you to initiate combat."
          - id: cover-concealment
            title: Cover & Concealment
            body:
              - "A ranged attack against a creature you can see and make a valid attack against but has over 1/2 of it's body covered by terrain or an obstacle is known as in cover. All attacks against this enemy is made with DisAdv (--). Marking a target removes it's cover bonus."
              - "To be considered hidden from another certain creature, the creature must not be able to see you and therefore be unaware of your presence or current location. This might come from making a successful Hide core ability, or from being invisible. An attack against a creature that you are hidden from has Adv (++). This grade of Adv may vary based on GM's discretion. Being hidden can be broken in many ways such as by making noise, being seen, or dealing damage."
              - "A melee attack against a target you cannot see (such as when you are blind or the target is invisible) is made with DisAdv (--)."
              - "A ranged attack against a target you cannot see (such as when you are blind or the target is invisible) can only be made against a creature within 5ft of you and is made with DisAdv (---)."
          - id: range
            title: Range
            body:
              - "There are 3 classes of range:"
              - "Melee refers to a range of 5ft."
              - "Short range refers to a range of 25ft."
              - "Long range refers to a range of 100ft."
              - "These values will be referred to throughout. If an ability has a specific range it can only be used within that range."
      - id: resistance-vulnerability
        title: Resistance and Vulnerability
        body: 
          - Resistance X to damage will reduce the total damage dealt by X on every instance of damage. This will normally specify certain damage types to apply this resistance to - such as Fire Resistance 2.
          
          - Vulnerability X will increase the total damage dealt by X on every instance of damage. This will normally specify certain damage types to apply this vulnerability to - such as Fire Vulnerability 2. At least 1 damage of the specified type must be dealt for this to have any affect.
      
      - id: healing
        title: Healing
        body: >-
          Healing can only heal a creature's HP. However, if a creature regains HP/is healed for more HP than they are missing, any surplus healing may be gained as shield in one energy type of their choice.
      
      - id: condition-mechanics
        title: Condition Mechanics
        body: >-
          Conditions are a type of negative effect. Conditions are continual effects that will always last until the start of the source's next turn unless stated otherwise. See the Resistance Roll section to learn how negative effects are applied.
      
      - id: abilities
        title: Abilities
        body: >-
          There are many abilities available to the characters (and other creatures) which will attack with increased attack power, AoE, apply conditions, push and pull creatures, grant boons and additional movement, gain or transfer energy point pools, and so on. Many of these also require (or have optional) additional energy costs to be able to use them.
      
      - id: unconscious-death
        title: Unconscious and Death
        body: >-
          - When a character's HP would reduced to 0, if it has any energy remaining (ignoring armour and shield energy) it instead falls unconscious and it's HP is set to 1 and it gains the Dying condition. If the creature has no energy remaining (ignoring armour and shield energy) it dies.

          - When any creature that is not a character is reduced to 0 HP it dies - unless the damage dealt is classed as non-lethal, in which case it falls unconscious and it's HP is set to 1.

  - id: conditions
    title: Conditions
    summary: Universal effects that modify a creature's capabilities.
    children:
      - id: blind
        title: Blind
        body: >-
          The creature cannot see. The creature cannot select or target anything that is not within 5ft of the creature. The creature automatically fails on all checks requiring sight. The creature will have appropriate levels of DisAdv for other checks that partially involve sight (DMs discretion). All attacks against the creature have Adv (++). All attacks made by the creature have DisAdv (--).
      
      - id: deaf
        title: Deaf
        body: >-
          The creature cannot hear. The creature automatically fails on all checks requiring hearing. The creature will have appropriate levels of DisAdv for other checks that partially involve hearing (DMs discretion).
      
      - id: marked
        title: Marked
        body: >-
          The creature has a mark placed on it. The effects of this mark are dependent on the ability it is associated with. Many abilities will have bonuses when used against the creature. The creature cannot become hidden or invisible while it has this condition. A hidden or invisible creature that becomes marked immediately becomes visible and a marked creature in cover no longer imposes DisAdv (--) on its attacker.
      
      - id: charmed
        title: Charmed
        body: >-
          The creature cannot attack the creature that has charmed it (the charmer) or target them with harmful abilities or magical effects. The creature treats the charmer as though they were a close friend. The charmer has Adv (++) on any ability check to interact socially with the creature.
      
      - id: dominated
        title: Dominated
        body: >-
          The creature is completely controlled by another creature (the dominator). Dominated creatures can attempt to harm themselves but will still need to make attack rolls as they struggle against the domination. When it comes to the dominated creature's turn in combat - the dominator takes their turn for them. All movement the creature makes is considered voluntary for the duration.
      
      - id: taunted
        title: Taunted
        body: >-
          The creature has DisAdv (--) on all attacks against creatures that aren't the source of the taunt (the taunter).
      
      - id: frightened
        title: Frightened
        body: >-
          The creature gains DisAdv (--) on all ability checks and attacks while the creature can see the source of the fear. The creature also cannot willingly move closer to the source of the fear.
      
      - id: prone
        title: Prone
        body: >-
          The creature's movement speed is halved and rounded down. This includes movement for abilities. Ranged attacks have DisAdv (--) against the creature, but melee attacks have Adv (++). The creature's attacks have DisAdv (--). 1AP must be spent to stand up. The creature cannot use abilities that involve movement except for teleportation which is still possible - the creature can still be pushed/pulled while prone.
      
      - id: hobbled
        title: Hobbled
        body: >-
          The creature's movement speed is halved and rounded down. This includes movement for abilities.
      
      - id: immobilised
        title: Immobilised
        body: >-
          The creature's base movement speed becomes 0ft. The creature cannot use abilities that involve movement except for teleportation which is still possible. The creature can also be pushed/pulled unless the GM deems it unreasonable.
      
      - id: dazed
        title: Dazed
        body: >-
          The creature starts its next turn with 1AP fewer and cannot use reactions while dazed. If the creature is dazed during its turn it immediately spends up to 1AP. If it now has 0 AP remaining its turn immediately ends, otherwise it may continue to act. In all cases the daze still lasts until the start of the creature's turn that was the source of the daze as normal. If a creature that is dazed becomes dazed again, the most recent daze is upgraded to a stun instead.
      
      - id: stunned
        title: Stunned
        body: >-
          The creature starts its next turn with 2AP fewer and cannot use reactions while stunned. If the creature is stunned during its turn it immediately spends up to 2AP. If it now has 0 AP remaining its turn immediately ends, otherwise it may continue to act. In all cases the stun still lasts until the start of the creature's turn that was the source of the stun as normal.
      
      - id: silenced
        title: Silenced
        body: >-
          The creature cannot use abilities. Passive abilities work as normal.
      
      - id: restrained
        title: Restrained
        body: >-
          The creature can only spend AP on movement or restraint specific actions such as escaping from the restraint.
      
      - id: incapacitated
        title: Incapacitated
        body: >-
          The creature can only spend AP on movement or restraint specific actions such as escaping from the restraint. The creature also cannot talk.
      
      - id: paralysed
        title: Paralysed
        body: >-
          The creature becomes rigid and cannot do anything while paralysed. All attack rolls against the creature have Adv (+++). Double the attack power of any attack against the creature if the attacker is within 5ft of the creature.
      
      - id: poisoned
        title: Poisoned
        body: >-
          The creature cannot heal or regain health or regain any energy type. This condition is removed by healing. When an instance of healing removes the poisoned condition, no health is regained.
      
      - id: bleeding
        title: Bleeding
        body: >-
          The creature suffers 1 damage in any energy type each time it spends 1 AP. This condition is removed by healing.
      
      - id: feeble
        title: Feeble
        body: >-
          All attacks this creature makes gain DisAdv (--).
      
      - id: vulnerability
        title: Vulnerability X
        body: >-
          The creature gains Vulnerability X to a specified damage type (such as physical, fire or psychic) where X is a number. All incoming damage of that type is increased by X.
      
      - id: unconscious
        title: Unconscious
        body: >-
          The creature falls limp and prone and cannot do anything while unconscious. It is unaware of its surroundings and all attacks against the creature gain Adv (+++). The creature remains unconscious until it is helped by another creature.

      - id: dying
        title: Dying
        body: >-
          When a creature gains the dying condition, it also falls unconscious. At the start of each of the creature's turns, it loses 3 energy (ignoring armour and shield) in any combination of its choice. If a creature with this condition has 0 energy in all 3 types at any time, and has 1 HP, its HP is set to 0 and it dies. The creature remains dying until it is helped by another creature or is healed. When healed, the creature does not lose the unconscious condition.

  - id: classes
    title: Classes
    summary: The different classes available to characters, and their abilities.
    children:
      - id: class-overview
        title: Class Overview
        body: >-
          Each class has a set of abilities that are unlocked at certain levels. These abilities can be used in combat and outside of combat. Some abilities have additional costs to use them, such as spending energy or suffering damage. Some abilities have a limited number of uses per long rest. Some abilities have a cooldown period before they can be used again.
      - id: class-tables
        title: Class Tables
        summary: Special rules and mechanics that apply to specific class abilities.
        children:
          - id: deadly-escalation
            title: Deadly Escalation
            body: >-
              An ability affected by Deadly Escalation will cause you to suffer direct damage equal to the number of times you have completed casting that ability since your last long rest. This damage occurs at the same time as you would spend other costs for the ability. For example, the first time you cast the ability you suffer no damage, but the second and third times you will suffer 1 and 2 direct damage respectively, and so on.
          - id: level-column-key
            title: Level Column Key
            body:
              - The number describes the level in this class at which these abilities are unlocked and possible to be gained by a character.
              - "\"Core\" in the level column means that the ability is a core ability and is automatically unlocked at level 1 in the class and can be used unlimited times (unless stated otherwise). You may only have the core abilities from 1 class active at any time, and you may change which class' core abilities are active after completing a long rest."
          - id: description-column-key
            title: Description Column Key
            body:
              - The first sentence is flavour text.
              - "\"Conditions\" are underlined and should have tooltips."
          - id: target-column-key
            title: Target Column Key
            body:
              - This column concisely describes what and how the ability assigns targets, range, and description of AoE. These details will all still be present in the description column.
              - "First part is who can it target:"
              - Self (Self) - Can only target self.
              - Allies (A) - Target willing creatures of your choice excluding self.
              - Enemies (E) - Target non willing creatures of your choice excluding self.
              - All (All) - Target all creatures including self.
              - Not Applicable (-)
              - "Second part is range:"
              - Melee Range (Melee)
              - Short Range (Short)
              - Long Range (Long)
              - Use Equipped Weapon Range (Weapon) This may specify Melee or Ranged only.
              - Or Specific Range e.g. (30ft)
              - "Third part is other specific descriptions:"
              - E.g. All within 40ft straight line from self (AoE)
              - E.g. Single target
              - E.g. Up to 3 targets
              - E.g. All within range (AoE)
              - All of these parts are optional but they will appear in this order.
          - id: ap-cost-column-key
            title: AP Cost Column Key
            body:
              - A number describes the AP cost.
              - A \"-" describes that the ability is either passive or costs 0 AP.